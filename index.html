        .info-text .mw-label { font-size: 11px; color: #007aff; font-weight: bold; display: block; }

        #map { flex: 1; position: relative; }

        #menu-toggle {
            position: absolute; top: 15px; left: 15px; z-index: 150;
            background: #1a1a1a; color: white; border: none; padding: 10px 15px;

            #container { flex-direction: column; }

            position: absolute; top: 15px; right: 15px; z-index: 50;

            box-shadow: 0 2px 6px rgba(0,0,0,0.2); font-size: 11px;

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

        .stats-table th { background: #f8f9fa; padding: 6px; border-bottom: 1px solid #eee; position: sticky; top: 0; }

let map, markers = [], infoWindow;
    const listEl = document.getElementById('dc-list');

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('menu-toggle');
        sidebar.classList.toggle('collapsed');
        if (sidebar.classList.contains('collapsed')) {
            toggleBtn.style.display = 'block';
        } else {
            toggleBtn.style.display = 'none';
        }
        setTimeout(() => { if(map) map.autoResize(); }, 350);
    }

    function toggleStats() {
        const wrapper = document.getElementById('stats-table-wrapper');
        const arrow = document.getElementById('stats-arrow');
        wrapper.classList.toggle('open');
        arrow.innerText = wrapper.classList.contains('open') ? '▼' : '▲';
    }

    function selectItem(item) {
        const activeItem = document.querySelector('.dc-item.active');
        if (activeItem) activeItem.classList.remove('active');
        item.classList.add('active');
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateStats() {
        if (!mapData.length) return;
        const stats = mapData.reduce((acc, d, idx) => {
            const region = (d.REG || "기타").trim();
            if (!acc[region]) acc[region] = { public: 0, private: 0, total: 0 };
            if (idx < 90) acc[region].public++;
            else acc[region].private++;
            acc[region].total++;
            return acc;
        }, {});
        const sorted = Object.keys(stats).sort((a, b) => stats[b].total - stats[a].total);
        let html = '<table class="stats-table"><thead><tr><th>지역</th><th>공공</th><th>민간</th><th>합계</th></tr></thead><tbody>';
        sorted.forEach(r => {
            const s = stats[r];
            html += `<tr><td>${r}</td><td>${s.public}</td><td>${s.private}</td><td class="stats-total">${s.total}</td></tr>`;
        });
        document.getElementById('stats-table-wrapper').innerHTML = html + '</tbody></table>';
    }

    function initMap() {
        updateStats();

        map = new naver.maps.Map('map', {
            zoom: 8, center: new naver.maps.LatLng(35.9, 127.7), zoomControl: true, zoomControlOptions: { position: naver.maps.Position.RIGHT_CENTER }
        });

        infoWindow = new naver.maps.InfoWindow({ backgroundColor: "#fff", borderColor: "#ccc", borderWidth: 1, disableAutoPan: false, maxWidth: 250 });

        const bounds = new naver.maps.LatLngBounds();
        const fragment = document.createDocumentFragment();
        const positionTracker = {};

        mapData.forEach((d, index) => {
            let lat = parseFloat(d.LAT);
            let lng = parseFloat(d.LNG);
            const coordKey = `${lat.toFixed(4)},${lng.toFixed(4)}`;

            if (positionTracker[coordKey]) {
                const offset = positionTracker[coordKey] * 0.00003; 
                lat -= offset;
                lng += offset;
                positionTracker[coordKey]++;
            } else {
                positionTracker[coordKey] = 1;
            }

            const pos = new naver.maps.LatLng(lat, lng);
            let markerColor = (index < 90) ? "black" : (d.MW < 10 ? "gold" : (d.MW >= 40 ? "red" : "#007aff"));

            const marker = new naver.maps.Marker({
                position: pos, map: map,
                icon: {
                    content: `<div style="display:flex;flex-direction:column;align-items:center;"><div style="width:14px;height:14px;background-color:${markerColor};border:1.5px solid white;border-radius:50%;box-shadow:0 0 4px rgba(0,0,0,0.2);"></div><div style="width:1.5px;height:4px;background-color:${markerColor};"></div></div>`,
                    anchor: new naver.maps.Point(7, 18)
                }
            });
            markers.push(marker);

            const item = document.createElement('div');
            item.className = 'dc-item';
            item.setAttribute('data-search', (d.NAME + d.REG + d.ADDR).toLowerCase());
            item.innerHTML = `
                <div class="color-dot" style="background-color:${markerColor};"></div>
                <div class="info-text">
                    <b>${d.NAME}</b>
                    <span class="mw-label">용량: ${d.MW > 0 ? d.MW + ' MW' : '미상'}</span>
                    <span class="addr-label">${d.ADDR || '주소 미상'}</span>
                </div>`;

            const moveToDC = () => {
                map.setZoom(17);
                map.panTo(pos);
                selectItem(item); 
                infoWindow.setContent(`<div class="iw-inner"><b>${d.NAME}</b><span>${d.ADDR || ''}</span><span style="color:#007aff; font-weight:bold;">용량: ${d.MW > 0 ? d.MW + ' MW' : '미상'}</span></div>`);
                infoWindow.open(map, marker);
                if(window.innerWidth <= 768) toggleSidebar();
            };

            naver.maps.Event.addListener(marker, 'click', moveToDC);
            item.onclick = moveToDC;

            fragment.appendChild(item);
            bounds.extend(pos);
        });

        listEl.appendChild(fragment);
        
        // 초기 카운터 표시
        updateCounter(mapData.length, mapData.filter((_, i) => i < 90).length, mapData.filter((_, i) => i >= 90).length);
        
        if (!bounds.isEmpty()) map.fitBounds(bounds);
        naver.maps.Event.addListener(map, 'click', () => infoWindow.close());
    }

    // [기능] 카운터 텍스트 업데이트 함수
    function updateCounter(total, pub, priv) {
        document.getElementById('counter').innerHTML = `전체: <b>${total}</b> (공공: ${pub} / 민간: ${priv})`;
    }

    function filterList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        let totalCount = 0;
        let publicCount = 0;
        let privateCount = 0;

        document.querySelectorAll('.dc-item').forEach((item, idx) => {
            const match = item.getAttribute('data-search').includes(query);
            item.style.display = match ? 'flex' : 'none';
            markers[idx].setMap(match ? map : null);
            
            if (match) {
                totalCount++;
                if (idx < 90) publicCount++;
                else privateCount++;
            }
        });
        
        updateCounter(totalCount, publicCount, privateCount);
    }

    window.onload = initMap;
